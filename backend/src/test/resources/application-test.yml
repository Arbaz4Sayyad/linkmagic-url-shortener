server:
  port: 0 # Random port for testing

spring:
  application:
    name: url-shortener-test
  
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
    
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        
  redis:
    host: localhost
    port: 6379
    timeout: 2000ms
    
  cache:
    type: none

  flyway:
    enabled: false # Disable for tests, use JPA auto-create

rate-limit:
  enabled: false # Disable for integration tests

logging:
  level:
    com.urlshortener: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
